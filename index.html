<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Analyze images for emotional triggers and health risk correlations using AI">
  <title>Emotional Trigger Risk Analyzer</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="bg-glow"></div>
  <div class="container">
    <header>
      <h1>Emotional Trigger <span class="accent">Risk Analyzer</span></h1>
      <p class="subtitle">Upload an image to analyze emotional triggers and health risk correlations</p>
    </header>

    <main>
      <section class="card input-section">
        <div class="field">
          <label for="api-key">OpenRouter API Key</label>
          <div class="input-wrapper">
            <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            <input type="password" id="api-key" placeholder="sk-or-v1-..." autocomplete="off">
          </div>
        </div>

        <div class="field">
          <label for="model-select">Model</label>
          <select id="model-select">
            <optgroup label="Recommended">
              <option value="anthropic/claude-haiku-4.5">Claude Haiku 4.5</option>
              <option value="google/gemini-2.0-flash-lite-001">Gemini 2.0 Flash Lite</option>
              <option value="qwen/qwen-plus">Qwen Plus 3.6</option>
            </optgroup>
            <optgroup label="Anthropic">
              <option value="anthropic/claude-3.5-sonnet">Claude 3.5 Sonnet</option>
              <option value="anthropic/claude-3-opus">Claude 3 Opus</option>
            </optgroup>
            <optgroup label="OpenAI">
              <option value="openai/gpt-4o">GPT-4o</option>
              <option value="openai/gpt-4o-mini">GPT-4o Mini</option>
            </optgroup>
            <optgroup label="Meta & Open Source">
              <option value="meta-llama/llama-3.2-90b-vision-instruct">Llama 3.2 90B Vision</option>
              <option value="meta-llama/llama-3.2-11b-vision-instruct">Llama 3.2 11B Vision</option>
              <option value="qwen/qwen-vl-plus">Qwen VL Plus</option>
            </optgroup>
          </select>
        </div>

        <div class="field">
          <label>Image</label>
          <div class="drop-zone" id="drop-zone">
            <input type="file" id="image-input" accept="image/*" hidden>
            <div class="drop-content" id="drop-content">
              <div class="drop-icon-ring">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
              </div>
              <span>Drop image here or <strong>browse</strong></span>
              <span class="drop-hint">Supports JPG, PNG, WEBP</span>
            </div>
            <img id="preview" class="preview hidden" alt="Preview">
          </div>
        </div>

        <button id="analyze-btn" disabled>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          Analyze Image
        </button>
      </section>

      <div class="loader hidden" id="loader">
        <div class="spinner"></div>
        <p>Analyzing image&hellip; this may take up to a minute.</p>
      </div>

      <div class="error hidden" id="error-msg"></div>

      <section class="output-section hidden" id="output-section">
        <div class="output-header">
          <h2>Analysis Results</h2>
          <button class="copy-btn" id="copy-btn" title="Copy raw text to clipboard">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            Copy
          </button>
        </div>
        <div class="output-content" id="output-content"></div>
      </section>
    </main>

    <footer>
      <p>Powered by OpenRouter &middot; Research Tool</p>
    </footer>
  </div>
  <script src="script.js"></script>
</body>
</html>
